name: Auto-merge harness PRs

on:
  pull_request:
    types: [opened, labeled, synchronize]
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && 
       (startsWith(github.head_ref, 'agent/issue-') || 
        contains(github.event.pull_request.labels.*.name, 'harness-bot'))) ||
      github.event_name == 'check_suite'

    steps:
      - name: Enable auto-merge
        run: |
          gh pr merge --auto --merge --delete-branch "${{ github.event.pull_request.number }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
